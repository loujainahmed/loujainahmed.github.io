---
layout: default
title: Home
---

<section class="hero">
  <h1>Your Name</h1>
  <p>Physics & Astrophysics Student exploring neutron stars and the universe.</p>
</section>

<section>
  <h2>Featured Writing</h2>
  <div class="cards">
    {% for post in site.posts limit:3 %}
    <div class="card">
      <h3>{{ post.title }}</h3>
      <p>{{ post.excerpt }}</p>
      <p>
        {% for tag in post.tags %}
          <span class="tag">#{{ tag }}</span>
        {% endfor %}
      </p>
      <a href="{{ post.url }}">Read more →</a>
    </div>
    {% endfor %}
  </div>
</section>
